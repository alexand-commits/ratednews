<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>RatedNews — Trust the source, not just the story</title>
    <meta name="description" content="AI-powered media bias and accuracy ratings for 50+ news outlets including BBC, CNN, Fox News, The Guardian and more. Every article scored for accuracy, bias, and headline fairness — updated hourly." />

    <!-- Canonical -->
    <link rel="canonical" href="https://ratednews.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ratednews.com/" />
    <meta property="og:title" content="RatedNews — Trust the source, not just the story" />
    <meta property="og:description" content="AI-powered media bias and accuracy ratings for 50+ news outlets including BBC, CNN, Fox News, The Guardian and more. Updated hourly." />
    <meta property="og:image" content="https://ratednews.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="RatedNews" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ratednews.com/" />
    <meta name="twitter:title" content="RatedNews — Trust the source, not just the story" />
    <meta name="twitter:description" content="AI-powered media bias and accuracy ratings for 50+ news outlets including BBC, CNN, Fox News, The Guardian and more. Updated hourly." />
    <meta name="twitter:image" content="https://ratednews.com/og-image.svg" />

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#D85A30" />

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
