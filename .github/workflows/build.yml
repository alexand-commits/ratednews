name: Build Check

on:
  push:
    branches: [main, feature/explore-page]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      # getStaticProps calls are try/catch-wrapped, so the build succeeds
      # without secrets — this catches compile/JSX/import breakage.
      - run: npm run build
