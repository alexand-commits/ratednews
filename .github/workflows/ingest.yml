name: RSS Ingestion

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 mins — free on public repos (unlimited Actions minutes)
  workflow_dispatch:         # Keep for manual runs / testing

# Never let two ingest runs overlap — a slow run won't collide with the next tick.
# Lets us safely tighten the cadence without duplicate work.
concurrency:
  group: rss-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Cache npm — saves ~60s per run (~1,440 mins/month at 30-min intervals)
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci

      - name: Ingest RSS feeds
        id: ingest
        run: node scripts/ingest.mjs
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # Only re-cluster when new articles were ingested this run
      - name: Cluster articles
        if: steps.ingest.outputs.inserted != '0'
        run: node scripts/cluster.mjs
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
