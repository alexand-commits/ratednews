name: RSS Ingestion

on:
  workflow_dispatch:        # Primary trigger — cron.org fires this every 30 mins
    branches: [main]        # Only run on main — never on staging

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Cache npm — saves ~60s per run (~1,440 mins/month at 30-min intervals)
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci

      - name: Ingest RSS feeds
        id: ingest
        run: node scripts/ingest.mjs
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # Only score when ingest actually inserted new articles
      - name: Score articles
        id: score
        if: steps.ingest.outputs.inserted != '0'
        run: node scripts/score.mjs
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Only aggregate when articles were actually scored this run
      - name: Aggregate outlet scores
        if: steps.score.outputs.scored != '0'
        run: node scripts/aggregate-outlets.mjs
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # Only re-cluster when new articles were ingested this run
      - name: Cluster articles
        if: steps.ingest.outputs.inserted != '0'
        run: node scripts/cluster.mjs
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
