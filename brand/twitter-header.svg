<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1917"/>
      <stop offset="100%" stop-color="#2C2A27"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Coral accent bar top -->
  <rect x="0" y="0" width="1500" height="6" fill="#D85A30"/>

  <!-- Wordmark -->
  <text x="120" y="240" font-family="Georgia, serif" font-size="130" font-weight="700" fill="white">Rated</text>
  <text x="120" y="370" font-family="Georgia, serif" font-size="130" font-weight="700" fill="#D85A30">News</text>

  <!-- Tagline -->
  <text x="122" y="430" font-family="system-ui, sans-serif" font-size="28" fill="#9E9B95">Trust the source, not just the story</text>

  <!-- Right side — score card -->
  <rect x="950" y="80" width="440" height="340" rx="20" fill="white" opacity="0.05"/>
  <rect x="950" y="80" width="440" height="340" rx="20" fill="none" stroke="#D85A30" stroke-width="1.5" opacity="0.3"/>

  <text x="1170" y="160" font-family="system-ui, sans-serif" font-size="18" fill="#9E9B95" text-anchor="middle" letter-spacing="3">ACCURACY</text>
  <text x="1170" y="265" font-family="Georgia, serif" font-size="110" font-weight="700" fill="#D85A30" text-anchor="middle">84</text>

  <!-- Bar -->
  <rect x="990" y="290" width="360" height="8" rx="4" fill="#2C2A27"/>
  <rect x="990" y="290" width="302" height="8" rx="4" fill="#D85A30"/>

  <text x="1170" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#9E9B95" text-anchor="middle">Highly credible · Centre bias</text>

  <!-- Coral bottom bar -->
  <rect x="0" y="494" width="1500" height="6" fill="#D85A30"/>
</svg>
